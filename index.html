<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タイマー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body {
  font-family: Arial,sans-serif;
  text-align:center;
  margin:0;
  padding-top:50px;
  transition: background-color 0.5s, color 0.5s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
  touch-action: none;
}
#timer { font-size:48px; margin-bottom:20px; }

button {
  font-size:18px;
  padding:10px 20px;
  margin:5px;
  border-radius:8px;
  border:none;
}

.side-gif{
  position:fixed;
  width:120px;
  display:none;
}
#leftGif{ left:0; top:50%; transform:translateY(-50%); }
#rightGif{ right:10px; top:50%; transform:translateY(-50%); }

.added-click-gif{
  position:absolute;
  transform:translate(-50%,-50%);
}
</style>
</head>
<body>

<img id="leftGif" class="side-gif" src="gifs/left.gif">
<img id="rightGif" class="side-gif" src="gifs/right.gif">

<div id="timer">00:00</div>

<button id="startStopBtn">Start</button>
<button id="resetBtn">Reset</button>
<button id="rainbowBtn">Rainbow OFF</button>

<script>
const timer = document.getElementById('timer');
const startStopBtn = document.getElementById('startStopBtn');
const resetBtn = document.getElementById('resetBtn');
const rainbowBtn = document.getElementById('rainbowBtn');
const leftGif = document.getElementById('leftGif');
const rightGif = document.getElementById('rightGif');

let running=false;
let startTime=0;
let elapsedTime=0;
let timerInterval;

let rainbowActive=false;
let addedGifs=[];

// ===== タイマー =====
function formatTime(ms){
  const s=Math.floor(ms/1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function updateTimer(){
  if(running){
    elapsedTime=Date.now()-startTime;
    timer.textContent=formatTime(elapsedTime);
  }
}
startStopBtn.onclick=()=>{
  if(!running){
    startTime=Date.now()-elapsedTime;
    timerInterval=setInterval(updateTimer,10);
    running=true;
  }else{
    clearInterval(timerInterval);
    running=false;
  }
};
resetBtn.onclick=()=>{
  clearInterval(timerInterval);
  elapsedTime=0;
  timer.textContent="00:00";
};

// ===== レインボー =====
rainbowBtn.onclick=()=>{
  rainbowActive=!rainbowActive;
  leftGif.style.display=rainbowActive?'block':'none';
  rightGif.style.display=rainbowActive?'block':'none';
};

// ===== GIF生成（修正済み）=====
document.addEventListener('pointerdown', (e)=>{
  if(!rainbowActive) return;
  if(e.target.closest('button')) return;

  const pos={x:e.clientX,y:e.clientY};

  // ⭐既存GIFに触れてたら生成しない
  let touching=false;
  addedGifs.forEach(gif=>{
    const rect=gif.el.getBoundingClientRect();
    if(pos.x>=rect.left && pos.x<=rect.right &&
       pos.y>=rect.top && pos.y<=rect.bottom){
      touching=true;
    }
  });
  if(touching) return;

  const gif=document.createElement('img');
  gif.src='gifs/left.gif';
  gif.classList.add('added-click-gif');

  gif.style.left=pos.x+'px';
  gif.style.top=pos.y+'px';
  gif.style.width='100px';

  document.body.appendChild(gif);

  let vx=(Math.random()*4+2)*(Math.random()<0.5?-1:1);
  let vy=(Math.random()*4+2)*(Math.random()<0.5?-1:1);

  function move(){
    let x=parseFloat(gif.style.left);
    let y=parseFloat(gif.style.top);
    let size=parseFloat(gif.style.width);

    x+=vx; y+=vy;

    if(x-size/2<=0||x+size/2>=window.innerWidth) vx*=-1;
    if(y-size/2<=0||y+size/2>=window.innerHeight) vy*=-1;

    gif.style.left=x+'px';
    gif.style.top=y+'px';

    gif.rafId=requestAnimationFrame(move);
  }
  move();

  addedGifs.push({el:gif,rafId:null});
}, true);

// ===== ドラッグ捕獲 =====
let dragging=false;
let capturedGifs=[];

function getPos(e){
  return e.touches
    ? {x:e.touches[0].clientX,y:e.touches[0].clientY}
    : {x:e.clientX,y:e.clientY};
}

// ⭐移動中も捕まえる
function checkHit(pos){
  addedGifs.forEach(gif=>{
    if(capturedGifs.find(g=>g.gif===gif)) return;

    const rect=gif.el.getBoundingClientRect();
    if(pos.x>=rect.left && pos.x<=rect.right &&
       pos.y>=rect.top && pos.y<=rect.bottom){

      cancelAnimationFrame(gif.rafId);

      capturedGifs.push({
        gif,
        offsetX:parseFloat(gif.el.style.left)-pos.x,
        offsetY:parseFloat(gif.el.style.top)-pos.y
      });
    }
  });
}

function dragStart(e){
  dragging=true;
  capturedGifs=[];
  checkHit(getPos(e));
}

function dragMove(e){
  if(!dragging) return;
  const pos=getPos(e);
  e.preventDefault();

  checkHit(pos);

  capturedGifs.forEach(item=>{
    item.gif.el.style.left=(pos.x+item.offsetX)+'px';
    item.gif.el.style.top=(pos.y+item.offsetY)+'px';
  });
}

function dragEnd(){
  dragging=false;

  capturedGifs.forEach(item=>{
    let vx=(Math.random()*4+2)*(Math.random()<0.5?-1:1);
    let vy=(Math.random()*4+2)*(Math.random()<0.5?-1:1);

    function move(){
      let x=parseFloat(item.gif.el.style.left);
      let y=parseFloat(item.gif.el.style.top);
      let size=parseFloat(item.gif.el.style.width);

      x+=vx; y+=vy;

      if(x-size/2<=0||x+size/2>=window.innerWidth) vx*=-1;
      if(y-size/2<=0||y+size/2>=window.innerHeight) vy*=-1;

      item.gif.el.style.left=x+'px';
      item.gif.el.style.top=y+'px';

      item.gif.rafId=requestAnimationFrame(move);
    }
    move();
  });

  capturedGifs=[];
}

// イベント
['mousedown','touchstart'].forEach(e=>document.addEventListener(e,dragStart));
['mousemove','touchmove'].forEach(e=>document.addEventListener(e,dragMove,{passive:false}));
['mouseup','touchend'].forEach(e=>document.addEventListener(e,dragEnd));

</script>

</body>
</html>
