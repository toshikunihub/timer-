<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スマホ対応GIFドラッグ（複数捕捉版）</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #f0f0f0;
    user-select: none;
    touch-action: none;
  }

  .gif {
    position: absolute;
    width: 100px;
    height: 100px;
    cursor: grab;
    z-index: 1;
    pointer-events: auto;
    touch-action: none;
  }

  button {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100; 
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<button id="addGifBtn">GIF追加</button>
<div id="gifContainer"></div>

<script>
const gifContainer = document.getElementById('gifContainer');
const addGifBtn = document.getElementById('addGifBtn');

let gifCount = 0;
let dragging = {}; // タッチID+GIFID -> データ

// 指定座標に重なるGIFを取得
function getGIFsAtPoint(x, y) {
  return Array.from(document.querySelectorAll('.gif')).filter(gif => {
    const rect = gif.getBoundingClientRect();
    return x >= rect.left && x <= rect.right &&
           y >= rect.top && y <= rect.bottom;
  });
}

// タッチ開始
function startDrag(e) {
  e.preventDefault();
  const now = performance.now();
  for (let touch of e.changedTouches) {
    const x = touch.clientX;
    const y = touch.clientY;
    const gifs = getGIFsAtPoint(x, y);
    for (let gif of gifs) {
      const key = touch.identifier + '_' + gif.dataset.id;
      if (!dragging[key]) {
        dragging[key] = {
          element: gif,
          startX: x,
          startY: y,
          origX: parseFloat(gif.style.left),
          origY: parseFloat(gif.style.top),
          lastX: x,
          lastY: y,
          lastTime: now,
          velocityX: 0,
          velocityY: 0
        };
      }
    }
  }
}

// タッチ移動
function onDrag(e) {
  e.preventDefault();
  const now = performance.now();
  for (let touch of e.changedTouches) {
    const x = touch.clientX;
    const y = touch.clientY;

    // 指下にあるGIFをすべて捕まえる
    const gifs = getGIFsAtPoint(x, y);
    for (let gif of gifs) {
      const key = touch.identifier + '_' + gif.dataset.id;
      if (!dragging[key]) {
        dragging[key] = {
          element: gif,
          startX: x,
          startY: y,
          origX: parseFloat(gif.style.left),
          origY: parseFloat(gif.style.top),
          lastX: x,
          lastY: y,
          lastTime: now,
          velocityX: 0,
          velocityY: 0
        };
      }
    }

    // すでにドラッグ中のGIFを移動
    for (let key in dragging) {
      if (!key.startsWith(touch.identifier + '_')) continue;
      const data = dragging[key];
      const dx = x - data.startX;
      const dy = y - data.startY;
      data.element.style.left = data.origX + dx + 'px';
      data.element.style.top = data.origY + dy + 'px';

      const dt = now - data.lastTime;
      if (dt > 0) {
        data.velocityX = (x - data.lastX) / dt * 16;
        data.velocityY = (y - data.lastY) / dt * 16;
        data.lastX = x;
        data.lastY = y;
        data.lastTime = now;
      }
    }
  }
}

// タッチ終了（慣性飛ばし）
function endDrag(e) {
  e.preventDefault();
  for (let touch of e.changedTouches) {
    const keys = Object.keys(dragging).filter(k => k.startsWith(touch.identifier + '_'));
    for (let key of keys) {
      const data = dragging[key];
      const gifEl = data.element;
      let vx = data.velocityX * 5;
      let vy = data.velocityY * 5;

      function animate() {
        vx *= 0.95;
        vy *= 0.95;
        let left = parseFloat(gifEl.style.left) + vx;
        let top = parseFloat(gifEl.style.top) + vy;

        if (left < 0) { left = 0; vx = -vx*0.5; }
        if (top < 0) { top = 0; vy = -vy*0.5; }
        if (left > window.innerWidth - 100) { left = window.innerWidth - 100; vx = -vx*0.5; }
        if (top > window.innerHeight - 100) { top = window.innerHeight - 100; vy = -vy*0.5; }

        gifEl.style.left = left + 'px';
        gifEl.style.top = top + 'px';

        if (Math.abs(vx) > 0.5 || Math.abs(vy) > 0.5) requestAnimationFrame(animate);
      }
      animate();
      delete dragging[key];
    }
  }
}

// GIF追加
function addGif() {
  const gif = document.createElement('img');
  gif.src = 'https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif';
  gif.className = 'gif';
  gif.style.left = Math.random() * (window.innerWidth - 100) + 'px';
  gif.style.top = Math.random() * (window.innerHeight - 100) + 'px';
  gif.dataset.id = gifCount++;
  gifContainer.appendChild(gif);
}

// グローバルイベント登録
document.addEventListener('touchstart', startDrag, {passive:false});
document.addEventListener('touchmove', onDrag, {passive:false});
document.addEventListener('touchend', endDrag, {passive:false});
document.addEventListener('touchcancel', endDrag, {passive:false});
addGifBtn.addEventListener('click', addGif);
</script>

</body>
</html>
