<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スマホ対応GIFドラッグ</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #f0f0f0;
    user-select: none;
    touch-action: none; /* タッチ操作でスクロール抑制 */
  }

  .gif {
    position: absolute;
    width: 100px;
    height: 100px;
    cursor: grab;
    z-index: 1;
    pointer-events: auto;
    touch-action: none;
  }

  button {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100; /* GIFより前面 */
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<button id="addGifBtn">GIF追加</button>
<div id="gifContainer"></div>

<script>
const gifContainer = document.getElementById('gifContainer');
const addGifBtn = document.getElementById('addGifBtn');

let gifCount = 0;
let dragging = {}; // 複数GIF同時ドラッグ管理

// タッチID対応でドラッグ開始
function startDrag(e, gif) {
  e.preventDefault();
  for (let touch of e.changedTouches) {
    dragging[touch.identifier] = {
      element: gif,
      startX: touch.clientX,
      startY: touch.clientY,
      origX: parseFloat(gif.style.left),
      origY: parseFloat(gif.style.top),
      lastX: touch.clientX,
      lastY: touch.clientY,
      lastTime: performance.now(),
      velocityX: 0,
      velocityY: 0
    };
  }
}

// タッチ移動
function onDrag(e) {
  e.preventDefault();
  const now = performance.now();
  for (let touch of e.changedTouches) {
    const data = dragging[touch.identifier];
    if (!data) continue;
    const dx = touch.clientX - data.startX;
    const dy = touch.clientY - data.startY;
    data.element.style.left = data.origX + dx + 'px';
    data.element.style.top = data.origY + dy + 'px';

    const dt = now - data.lastTime;
    if (dt > 0) {
      data.velocityX = (touch.clientX - data.lastX) / dt * 16;
      data.velocityY = (touch.clientY - data.lastY) / dt * 16;
      data.lastX = touch.clientX;
      data.lastY = touch.clientY;
      data.lastTime = now;
    }
  }
}

// タッチ終了（慣性飛ばし）
function endDrag(e) {
  e.preventDefault();
  for (let touch of e.changedTouches) {
    const data = dragging[touch.identifier];
    if (!data) continue;
    const gifEl = data.element;

    let vx = data.velocityX * 5; // 飛ぶ倍率
    let vy = data.velocityY * 5;

    function animate() {
      vx *= 0.95; // 摩擦
      vy *= 0.95;
      let left = parseFloat(gifEl.style.left) + vx;
      let top = parseFloat(gifEl.style.top) + vy;

      // 画面端バウンド
      if (left < 0) { left = 0; vx = -vx * 0.5; }
      if (top < 0) { top = 0; vy = -vy * 0.5; }
      if (left > window.innerWidth - 100) { left = window.innerWidth - 100; vx = -vx * 0.5; }
      if (top > window.innerHeight - 100) { top = window.innerHeight - 100; vy = -vy * 0.5; }

      gifEl.style.left = left + 'px';
      gifEl.style.top = top + 'px';

      if (Math.abs(vx) > 0.5 || Math.abs(vy) > 0.5) {
        requestAnimationFrame(animate);
      }
    }
    animate();
    delete dragging[touch.identifier];
  }
}

// GIF追加
function addGif() {
  const gif = document.createElement('img');
  gif.src = 'https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif';
  gif.className = 'gif';
  gif.style.left = Math.random() * (window.innerWidth - 100) + 'px';
  gif.style.top = Math.random() * (window.innerHeight - 100) + 'px';
  gif.dataset.id = gifCount++;

  // タッチイベント追加
  gif.addEventListener('touchstart', (e) => startDrag(e, gif), { passive: false });

  gifContainer.appendChild(gif);
}

// グローバルにタッチ移動・終了を監視
document.addEventListener('touchmove', onDrag, { passive: false });
document.addEventListener('touchend', endDrag, { passive: false });
document.addEventListener('touchcancel', endDrag, { passive: false });

addGifBtn.addEventListener('click', addGif);
</script>

</body>
</html>
