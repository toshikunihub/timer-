<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIFドラッグ</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#f0f0f0;
  touch-action:none;
  user-select:none;
}

button{
  position:fixed;
  top:20px;
  left:20px;
  z-index:100;
  padding:12px 20px;
  font-size:16px;
}

.gif{
  position:absolute;
  width:100px;
  height:100px;
  touch-action:none;
}
</style>
</head>

<body>

<button id="addBtn">GIF追加</button>
<div id="container"></div>

<script>

const container = document.getElementById("container")
const addBtn = document.getElementById("addBtn")

let active = null

function addGif(){

  const gif = document.createElement("img")

  gif.src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif"

  gif.className="gif"

  gif.style.left = Math.random()*(window.innerWidth-100)+"px"
  gif.style.top  = Math.random()*(window.innerHeight-100)+"px"

  container.appendChild(gif)

  gif.addEventListener("pointerdown",startDrag)

}

function startDrag(e){

  active={
    el:e.target,
    startX:e.clientX,
    startY:e.clientY,
    origX:parseFloat(e.target.style.left),
    origY:parseFloat(e.target.style.top),
    vx:0,
    vy:0,
    lastX:e.clientX,
    lastY:e.clientY,
    lastT:performance.now()
  }

}

function moveDrag(e){

  if(!active) return

  const dx=e.clientX-active.startX
  const dy=e.clientY-active.startY

  active.el.style.left=active.origX+dx+"px"
  active.el.style.top=active.origY+dy+"px"

  const now=performance.now()
  const dt=now-active.lastT

  if(dt>0){
    active.vx=(e.clientX-active.lastX)/dt*16
    active.vy=(e.clientY-active.lastY)/dt*16
  }

  active.lastX=e.clientX
  active.lastY=e.clientY
  active.lastT=now

}

function endDrag(){

  if(!active) return

  let el=active.el
  let vx=active.vx*5
  let vy=active.vy*5

  function animate(){

    vx*=0.95
    vy*=0.95

    let x=parseFloat(el.style.left)+vx
    let y=parseFloat(el.style.top)+vy

    if(x<0){x=0;vx*=-0.5}
    if(y<0){y=0;vy*=-0.5}

    if(x>window.innerWidth-100){
      x=window.innerWidth-100
      vx*=-0.5
    }

    if(y>window.innerHeight-100){
      y=window.innerHeight-100
      vy*=-0.5
    }

    el.style.left=x+"px"
    el.style.top=y+"px"

    if(Math.abs(vx)>0.5 || Math.abs(vy)>0.5){
      requestAnimationFrame(animate)
    }

  }

  animate()

  active=null

}

document.addEventListener("pointermove",moveDrag)
document.addEventListener("pointerup",endDrag)
document.addEventListener("pointercancel",endDrag)

addBtn.onclick=addGif

</script>

</body>
</html>
