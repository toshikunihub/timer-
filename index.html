<audio id="rainbowBGM" loop></audio>
<audio id="clickSound" src="sounds/sound1.mp3"></audio>
<audio id="throwSound" src="sounds/throw.mp3"></audio>

<script>
// 省略: 既存のタイマー、ボタン、テーマ切替処理はそのまま

document.addEventListener('pointerdown', (e)=>{
  if(!rainbowActive || dragging) return;
  if(e.target.closest('button')) return;

  clickSound.currentTime=0;
  clickSound.play().catch(()=>{});

  const clickGif=document.createElement('img');
  const rand=Math.random();
  let isChooChoo=false;
  if(rand<0.05){ isChooChoo=true; }
  const isSpecial = !isChooChoo && rand>=0.9;
  clickGif.src = isChooChoo ? 'gifs/choochoo.gif' : isSpecial ? 'gifs/special.gif' : 'gifs/left.gif';
  clickGif.classList.add('added-click-gif');

  const baseSize = 50;
  const gifSize = baseSize * (1 + Math.random());
  let x=e.clientX, y=e.clientY;
  x = Math.min(Math.max(x, gifSize/2), window.innerWidth-gifSize/2);
  y = Math.min(Math.max(y, gifSize/2), window.innerHeight-gifSize/2);

  clickGif.style.left=`${x}px`;
  clickGif.style.top=`${y}px`;
  clickGif.style.width=`${gifSize}px`;
  clickGif.style.height=`${gifSize}px`;
  clickGif.style.transform='translate(-50%,-50%)';
  document.body.appendChild(clickGif);

  if(isChooChoo){
    const chooAudio = new Audio('sounds/choochoo.mp3');
    chooAudio.volume = 0.3; // ← 30%に修正
    chooAudio.play().catch(()=>{});
  }
  if(isSpecial) new Audio('sounds/sound2.mp3').play().catch(()=>{});

  // 省略: GIF移動・拡大処理も既存コードと同じ
});
</script>
