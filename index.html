<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タイマー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
  font-family: Arial,sans-serif;
  text-align:center;
  margin:0;
  padding-top:50px;
  transition: background-color 0.5s, color 0.5s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
  touch-action: none;
}
body.light-mode { background-color:#fff; color:#000; }
body.dark-mode { background-color:#121212; color:#fff; }

#timer { font-size:48px; margin-bottom:20px; }

.button-container {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  position:relative;
  z-index:2000; /* ⭐ 前面 */
}
.button-row {
  display:flex;
  gap:20px;
}

button {
  font-size:18px;
  padding:10px 20px;
  border-radius:8px;
  border:none;
  min-width:120px;
  min-height:40px;
  position:relative;
  z-index:2001; /* ⭐ GIFより前 */
}

#laps{
  margin-top:20px;
  border:1px solid #000;
  padding:10px;
  max-width:280px;
  max-height:200px;
  overflow-y:auto;
}

.side-gif{
  position:fixed;
  width:120px;
  display:none;
  z-index:1000;
}

.added-click-gif{
  position:absolute;
  z-index:1100;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body class="light-mode">

<img id="leftGif" class="side-gif" src="gifs/left.gif">
<img id="rightGif" class="side-gif" src="gifs/right.gif">

<div id="timer">00:00:00</div>

<div class="button-container">
  <div class="button-row">
    <button id="startStopBtn">Start</button>
    <button id="resetBtn">Reset</button>
  </div>
  <div class="button-row">
    <button id="themeToggleBtn">Dark OFF</button>
    <button id="rainbowBtn">Rainbow OFF</button>
  </div>
</div>

<div id="lapCounterDisplay">Lap Count: 0</div>
<div id="laps"><ul id="lapList"></ul></div>

<audio id="clickSound" src="sounds/sound1.mp3"></audio>

<script>
const timer = document.getElementById('timer');
const startStopBtn = document.getElementById('startStopBtn');
const resetBtn = document.getElementById('resetBtn');
const themeToggleBtn = document.getElementById('themeToggleBtn');
const rainbowBtn = document.getElementById('rainbowBtn');
const body = document.body;
const clickSound = document.getElementById('clickSound');

let running=false;
let startTime=0;
let elapsedTime=0;
let timerInterval;

let rainbowActive=false;
let addedGifs=[];
let dragging=false;
let capturedGifs=[];

// ===== タイマー =====
function formatTime(ms){
  const s=Math.floor(ms/1000);
  const m=String(Math.floor(s/60)).padStart(2,'0');
  const sec=String(s%60).padStart(2,'0');
  const cs=String(Math.floor((ms%1000)/10)).padStart(2,'0');
  return `${m}:${sec}:${cs}`;
}
function updateTimer(){
  if(running){
    elapsedTime=Date.now()-startTime;
    timer.textContent=formatTime(elapsedTime);
  }
}
startStopBtn.onclick=()=>{
  if(!running){
    startTime=Date.now()-elapsedTime;
    timerInterval=setInterval(updateTimer,10);
    running=true;
  }else{
    clearInterval(timerInterval);
    running=false;
  }
};
resetBtn.onclick=()=>{
  clearInterval(timerInterval);
  elapsedTime=0;
  timer.textContent="00:00:00";
};

// ===== レインボー =====
rainbowBtn.onclick=()=>{
  rainbowActive=!rainbowActive;
};

// ===== GIF生成（触ってたら生成しない）=====
document.addEventListener('pointerdown', (e)=>{
  if(!rainbowActive) return;
  if(e.target.closest('button')) return;

  const pos={x:e.clientX,y:e.clientY};

  // ⭐ 既存GIFチェック
  let touching=false;
  addedGifs.forEach(gif=>{
    const rect=gif.el.getBoundingClientRect();
    if(pos.x>=rect.left && pos.x<=rect.right &&
       pos.y>=rect.top && pos.y<=rect.bottom){
      touching=true;
    }
  });
  if(touching) return;

  clickSound.currentTime=0;
  clickSound.play().catch(()=>{});

  const gif=document.createElement('img');
  gif.src='gifs/left.gif';
  gif.classList.add('added-click-gif');

  gif.style.left=pos.x+'px';
  gif.style.top=pos.y+'px';
  gif.style.width='100px';

  document.body.appendChild(gif);

  let vx=(Math.random()*4+2)*(Math.random()<0.5?-1:1);
  let vy=(Math.random()*4+2)*(Math.random()<0.5?-1:1);

  function move(){
    let x=parseFloat(gif.style.left);
    let y=parseFloat(gif.style.top);
    let size=parseFloat(gif.style.width);

    x+=vx; y+=vy;

    if(x-size/2<=0||x+size/2>=window.innerWidth) vx*=-1;
    if(y-size/2<=0||y+size/2>=window.innerHeight) vy*=-1;

    gif.style.left=x+'px';
    gif.style.top=y+'px';

    gif.rafId=requestAnimationFrame(move);
  }
  move();

  addedGifs.push({el:gif,rafId:null});
}, true);

// ===== 捕獲判定（ドラッグ中も）=====
function getPos(e){
  return e.touches
    ? {x:e.touches[0].clientX,y:e.touches[0].clientY}
    : {x:e.clientX,y:e.clientY};
}

function checkHit(pos){
  addedGifs.forEach(gif=>{
    if(capturedGifs.find(g=>g.gif===gif)) return;

    const rect=gif.el.getBoundingClientRect();

    if(pos.x>=rect.left && pos.x<=rect.right &&
       pos.y>=rect.top && pos.y<=rect.bottom){

      cancelAnimationFrame(gif.rafId);

      capturedGifs.push({
        gif,
        offsetX:parseFloat(gif.el.style.left)-pos.x,
        offsetY:parseFloat(gif.el.style.top)-pos.y
      });
    }
  });
}

// ===== ドラッグ =====
function dragStart(e){
  dragging=true;
  capturedGifs=[];
  checkHit(getPos(e));
}

function dragMove(e){
  if(!dragging) return;
  const pos=getPos(e);
  e.preventDefault();

  // ⭐ 移動中も捕まえる
  checkHit(pos);

  capturedGifs.forEach(item=>{
    item.gif.el.style.left=(pos.x+item.offsetX)+'px';
    item.gif.el.style.top=(pos.y+item.offsetY)+'px';
  });
}

function dragEnd(){
  dragging=false;

  capturedGifs.forEach(item=>{
    let vx=(Math.random()*4+2)*(Math.random()<0.5?-1:1);
    let vy=(Math.random()*4+2)*(Math.random()<0.5?-1:1);

    function move(){
      let x=parseFloat(item.gif.el.style.left);
      let y=parseFloat(item.gif.el.style.top);
      let size=parseFloat(item.gif.el.style.width);

      x+=vx; y+=vy;

      if(x-size/2<=0||x+size/2>=window.innerWidth) vx*=-1;
      if(y-size/2<=0||y+size/2>=window.innerHeight) vy*=-1;

      item.gif.el.style.left=x+'px';
      item.gif.el.style.top=y+'px';

      item.gif.rafId=requestAnimationFrame(move);
    }
    move();
  });

  capturedGifs=[];
}

// イベント登録
['mousedown','touchstart'].forEach(e=>document.addEventListener(e,dragStart));
['mousemove','touchmove'].forEach(e=>document.addEventListener(e,dragMove,{passive:false}));
['mouseup','touchend'].forEach(e=>document.addEventListener(e,dragEnd));

</script>
</body>
</html>
